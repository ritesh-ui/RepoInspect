name: RepoInspect Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  scan:
    name: RepoInspect AI Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
          python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip list # Debug: Verify dependencies are installed

    - name: Run RepoInspect Scan
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        # Scan the current directory
        # Fails the build if High or Critical vulnerabilities are found
        python scan_repo.py . --fail-on High --markdown REPO_INSPECT_REPORT.md

    - name: Upload Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: repoinspect-report
        path: REPO_INSPECT_REPORT.md
